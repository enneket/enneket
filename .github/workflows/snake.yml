name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Generate Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: enneket
          outputs: |
            dist/github-snake.svg

      - name: Commit and Push
        run: |
          mkdir -p output
          cp dist/github-snake.svg output/github-snake.svg 2>/dev/null || true
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f output/github-snake.svg ]; then
            git add output/github-snake.svg
            git diff --staged --quiet || git commit -m "Update snake animation"
            git push
          else
            echo "No snake SVG generated, skipping commit"
          fi
